# Nginx reverse proxy for Capital Flow.
# HTTP-only by default — run:  sudo certbot --nginx -d yourdomain.com
# to add SSL automatically (certbot rewrites this file in-place).

server {
    listen 80;
    server_name _;   # accepts any hostname; replace _ with your domain when ready

    # --- Security headers ---
    add_header X-Content-Type-Options  "nosniff"                            always;
    add_header X-Frame-Options         "DENY"                               always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"    always;

    # --- Proxy to Docker app ---
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket / SSE upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE needs long timeouts and no buffering
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;
        proxy_cache         off;
    }
}

# Required for the WebSocket Connection header upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
