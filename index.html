    <!-- Fonts are self-hosted (see @font-face in src/styles/index.css) — no
         external CDN. Preload the two faces on the critical first-paint path:
         Switzer 400 (body/UI text) and JetBrains Mono (every number in the
         scanner table). The browser fetches them in parallel with the CSS
         instead of discovering them only after the stylesheet parses. -->
    <link rel="preload" href="/fonts/switzer-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono-latin.woff2" as="font" type="font/woff2" crossorigin />
